<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>زاوية جاليو — مخطط المحتوى</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0A0A0F;
  --surface: #12121A;
  --card: #18181F;
  --card-hover: #1E1E28;
  --border: rgba(255,255,255,0.07);
  --border-hover: rgba(249,115,22,0.4);
  --orange: #F97316;
  --orange-dim: rgba(249,115,22,0.15);
  --orange-glow: rgba(249,115,22,0.08);
  --green: #10B981;
  --amber: #F59E0B;
  --text: #E2E8F0;
  --text-muted: #64748B;
  --text-dim: #334155;
  --radius: 16px;
  --radius-sm: 10px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Tajawal', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; }

/* NAV */
nav { position: sticky; top: 0; z-index: 100; background: rgba(10,10,15,0.85); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border); padding: 0 24px; height: 60px; display: flex; align-items: center; justify-content: space-between; }
.nav-logo { display: flex; align-items: center; gap: 10px; }
.nav-logo-icon { width: 34px; height: 34px; background: var(--orange); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 16px; color: #fff; }
.nav-title { font-size: 15px; font-weight: 800; }
.nav-title span { color: var(--orange); }
.nav-stats { display: flex; gap: 16px; font-size: 12px; color: var(--text-muted); }
.nav-stats b { font-weight: 700; }
.stat-rec { color: var(--amber); }
.stat-done { color: var(--green); }

/* LAYOUT */
.layout { display: grid; grid-template-columns: 300px 1fr; gap: 0; height: calc(100vh - 60px); }

/* SIDEBAR */
.sidebar { background: var(--surface); border-left: 1px solid var(--border); padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 16px; }
.sidebar-block { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; }
.sidebar-block h3 { font-size: 13px; font-weight: 700; color: var(--text-muted); margin-bottom: 12px; }
.filter-btn { width: 100%; text-align: right; padding: 10px 12px; border-radius: var(--radius-sm); border: 1px solid var(--border); background: transparent; color: var(--text-muted); font-family: 'Tajawal', sans-serif; font-size: 13px; cursor: pointer; transition: all 0.2s; margin-bottom: 4px; display: flex; align-items: center; justify-content: space-between; }
.filter-btn:hover, .filter-btn.active { background: var(--orange-dim); border-color: var(--border-hover); color: var(--text); }
.filter-btn .count { font-size: 11px; background: var(--border); padding: 1px 7px; border-radius: 20px; }
.filter-btn.active .count { background: var(--orange); color: #fff; }
.tip { background: var(--orange-glow); border: 1px solid rgba(249,115,22,0.2); border-radius: var(--radius-sm); padding: 12px; font-size: 12px; color: rgba(249,115,22,0.9); line-height: 1.6; }

/* HAMBURGER — mobile only */
.hamburger-btn { display: none; width: 36px; height: 36px; border-radius: 8px; background: var(--card); border: 1px solid var(--border); color: var(--text); font-size: 18px; cursor: pointer; align-items: center; justify-content: center; flex-shrink: 0; transition: all 0.2s; }
.hamburger-btn:hover { border-color: var(--orange); color: var(--orange); }

/* DRAWER OVERLAY */
.drawer-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 150; display: none; backdrop-filter: blur(4px); }
.drawer-overlay.open { display: block; }

/* MOBILE */
@media (max-width: 900px) {
  .layout { grid-template-columns: 1fr; }
  .hamburger-btn { display: flex; }
  .sidebar {
    position: fixed;
    top: 0; right: -320px;
    width: 300px; height: 100vh;
    z-index: 160;
    transition: right 0.3s cubic-bezier(0.4,0,0.2,1);
    border-left: 1px solid var(--border);
    padding-top: 70px;
  }
  .sidebar.drawer-open { right: 0; }
}

/* MAIN */
.main { overflow-y: auto; padding: 20px; }
.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 14px; }
@media (max-width: 600px) { .grid { grid-template-columns: 1fr; } .main { padding: 12px; } }

/* CARD */
.card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); cursor: pointer; transition: all 0.2s; position: relative; overflow: hidden; }
.card:hover { border-color: rgba(249,115,22,0.25); background: var(--card-hover); transform: translateY(-2px); }
.card.done { opacity: 0.6; }
.card.done .card-status-bar { background: var(--green); box-shadow: 0 0 8px rgba(16,185,129,0.5); }
.card.recording .card-status-bar { background: var(--amber); box-shadow: 0 0 8px rgba(245,158,11,0.5); }
.card-status-bar { position: absolute; top: 0; right: 0; width: 4px; height: 100%; background: rgba(148,163,184,0.25); transition: background 0.3s; }
.card-head { padding: 14px 16px 10px; }
.card-meta { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
.card-cat { font-size: 10px; font-weight: 700; color: var(--text-muted); background: rgba(255,255,255,0.04); padding: 2px 8px; border-radius: 20px; }
.card-num { font-size: 11px; color: var(--text-dim); font-weight: 700; }
.card-title { font-size: 13px; font-weight: 500; color: var(--text); line-height: 1.6; }
.card-foot { padding: 10px 16px 14px; border-top: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
.card-progress { display: flex; align-items: center; gap: 8px; }
.progress-bar { width: 60px; height: 3px; background: var(--border); border-radius: 3px; overflow: hidden; }
.progress-fill { height: 100%; background: var(--orange); border-radius: 3px; transition: width 0.3s; }
.progress-label { font-size: 10px; color: var(--text-muted); }
.card-actions { display: flex; gap: 6px; }
.btn-icon { width: 28px; height: 28px; border-radius: 8px; border: 1px solid var(--border); background: transparent; color: var(--text-muted); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 13px; transition: all 0.15s; }
.btn-icon:hover { border-color: var(--orange); color: var(--orange); background: var(--orange-dim); }
.btn-icon.danger:hover { border-color: #EF4444; color: #EF4444; background: rgba(239,68,68,0.1); }

/* MODAL */
.overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(8px); z-index: 200; display: none; align-items: center; justify-content: center; padding: 20px; }
.overlay.open { display: flex; }
.modal { background: var(--surface); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; width: 100%; max-width: 640px; max-height: 90vh; overflow: hidden; display: flex; flex-direction: column; }
.modal-head { padding: 20px 24px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; }
.modal-head-info { flex: 1; }
.modal-cat-tag { font-size: 10px; font-weight: 700; color: var(--orange); background: var(--orange-dim); padding: 2px 8px; border-radius: 20px; display: inline-block; margin-bottom: 6px; }
.modal-title { font-size: 15px; font-weight: 700; line-height: 1.5; color: var(--text); }
.modal-close { width: 32px; height: 32px; border-radius: 8px; background: transparent; border: 1px solid var(--border); color: var(--text-muted); cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all 0.15s; }
.modal-close:hover { border-color: #EF4444; color: #EF4444; }
.modal-body { padding: 20px 24px; overflow-y: auto; flex: 1; display: flex; flex-direction: column; gap: 14px; }
.modal-status-row { display: flex; gap: 8px; }
.status-btn { flex: 1; padding: 10px 8px; border-radius: var(--radius-sm); border: 1px solid var(--border); background: transparent; color: var(--text-muted); font-family: 'Tajawal', sans-serif; font-size: 12px; font-weight: 700; cursor: pointer; transition: all 0.2s; }
.status-btn.pending.active { background: rgba(148,163,184,0.18); border-color: #94A3B8; color: #CBD5E1; box-shadow: 0 0 10px rgba(148,163,184,0.15); }
.status-btn.recording.active { background: rgba(245,158,11,0.22); border-color: var(--amber); color: #FCD34D; box-shadow: 0 0 12px rgba(245,158,11,0.3); }
.status-btn.done.active { background: rgba(16,185,129,0.22); border-color: var(--green); color: #34D399; box-shadow: 0 0 12px rgba(16,185,129,0.3); }
.textarea-label { font-size: 11px; font-weight: 700; color: var(--text-muted); margin-bottom: 6px; display: flex; align-items: center; justify-content: space-between; }
.autosave-badge { font-size: 10px; color: var(--green); opacity: 0; transition: opacity 0.3s; }
.autosave-badge.show { opacity: 1; }
.script-area { width: 100%; background: rgba(0,0,0,0.3); border: 1px solid var(--border); border-radius: var(--radius-sm); color: var(--text); font-family: 'Tajawal', sans-serif; font-size: 14px; line-height: 1.8; padding: 14px; resize: vertical; min-height: 200px; outline: none; transition: border-color 0.2s; direction: rtl; }
.script-area:focus { border-color: rgba(249,115,22,0.4); }
.hook-highlight { color: var(--orange); font-weight: 700; }
.modal-foot { padding: 14px 24px; border-top: 1px solid var(--border); display: flex; gap: 8px; justify-content: flex-end; }
.btn { padding: 9px 18px; border-radius: var(--radius-sm); font-family: 'Tajawal', sans-serif; font-size: 13px; font-weight: 700; cursor: pointer; border: 1px solid var(--border); transition: all 0.2s; }
.btn-primary { background: var(--orange); border-color: var(--orange); color: #fff; }
.btn-primary:hover { background: #EA6F0A; }
.btn-ghost { background: transparent; color: var(--text-muted); }
.btn-ghost:hover { background: var(--card); color: var(--text); }
.btn-tele { background: #1a1a2e; border-color: rgba(139,92,246,0.4); color: #A78BFA; }
.btn-tele:hover { background: rgba(139,92,246,0.15); }

/* TELEPROMPTER */
.tele-overlay { position: fixed; inset: 0; background: #000; z-index: 500; display: none; flex-direction: column; }
.tele-overlay.open { display: flex; }
.tele-controls { padding: 16px 24px; display: flex; align-items: center; gap: 10px; background: rgba(255,255,255,0.03); border-bottom: 1px solid rgba(255,255,255,0.06); flex-shrink: 0; flex-wrap: wrap; }
.tele-controls span { font-size: 13px; color: rgba(255,255,255,0.5); }
.tele-speed-wrap { display: flex; align-items: center; gap: 8px; margin-right: auto; }
.speed-btn { width: 32px; height: 32px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; color: #fff; font-size: 14px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
.speed-btn:hover { background: rgba(255,255,255,0.1); }
.speed-label { font-size: 12px; color: rgba(255,255,255,0.5); min-width: 40px; text-align: center; }
.tele-btn { padding: 7px 16px; border-radius: 8px; font-family: 'Tajawal', sans-serif; font-size: 13px; font-weight: 700; cursor: pointer; border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.05); color: #fff; transition: all 0.2s; }
.tele-btn.play { background: var(--orange); border-color: var(--orange); }
.tele-btn.stop { background: rgba(239,68,68,0.2); border-color: rgba(239,68,68,0.4); color: #FCA5A5; }
.tele-btn.restart { background: rgba(139,92,246,0.2); border-color: rgba(139,92,246,0.4); color: #A78BFA; }
.tele-scroll { flex: 1; overflow-y: scroll; overflow-x: hidden; position: relative; cursor: grab; user-select: none; }
.tele-scroll:active { cursor: grabbing; }
.tele-scroll::-webkit-scrollbar { width: 4px; }
.tele-scroll::-webkit-scrollbar-track { background: rgba(255,255,255,0.03); }
.tele-scroll::-webkit-scrollbar-thumb { background: rgba(249,115,22,0.4); border-radius: 4px; }
.tele-text-wrap { padding: 60px 10%; font-size: clamp(22px, 4vw, 36px); line-height: 1.9; color: #fff; direction: rtl; text-align: center; padding-bottom: 60vh; }
.tele-hook { color: var(--orange); font-weight: 900; }
.tele-center-line { position: absolute; top: 50%; left: 0; right: 0; height: 2px; background: rgba(249,115,22,0.2); pointer-events: none; }

/* DELETE CONFIRM */
.confirm-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 300; display: none; align-items: center; justify-content: center; }
.confirm-overlay.open { display: flex; }
.confirm-box { background: var(--surface); border: 1px solid rgba(239,68,68,0.3); border-radius: var(--radius); padding: 24px; max-width: 320px; text-align: center; }
.confirm-box h4 { font-size: 15px; font-weight: 700; margin-bottom: 8px; }
.confirm-box p { font-size: 13px; color: var(--text-muted); margin-bottom: 20px; line-height: 1.6; }
.confirm-btns { display: flex; gap: 8px; }
.btn-danger { flex: 1; padding: 9px; border-radius: var(--radius-sm); background: rgba(239,68,68,0.15); border: 1px solid rgba(239,68,68,0.4); color: #FCA5A5; font-family: 'Tajawal', sans-serif; font-size: 13px; font-weight: 700; cursor: pointer; }
.btn-cancel { flex: 1; padding: 9px; border-radius: var(--radius-sm); background: transparent; border: 1px solid var(--border); color: var(--text-muted); font-family: 'Tajawal', sans-serif; font-size: 13px; font-weight: 700; cursor: pointer; }

/* Empty */
.empty { text-align: center; padding: 60px 20px; color: var(--text-muted); }
.empty-icon { font-size: 40px; margin-bottom: 12px; }

/* COLLAPSIBLE CATEGORIES */
.cat-group { margin-bottom: 4px; }
.cat-header { width: 100%; text-align: right; padding: 10px 12px; border-radius: var(--radius-sm); border: 1px solid var(--border); background: transparent; color: var(--text-muted); font-family: 'Tajawal', sans-serif; font-size: 13px; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; justify-content: space-between; gap: 8px; }
.cat-header:hover { background: var(--orange-dim); border-color: var(--border-hover); color: var(--text); }
.cat-header.active { background: var(--orange-dim); border-color: var(--border-hover); color: var(--text); }
.cat-header .cat-left { display: flex; align-items: center; gap: 8px; flex: 1; }
.cat-header .cat-arrow { font-size: 10px; transition: transform 0.25s; flex-shrink: 0; }
.cat-header.open .cat-arrow { transform: rotate(180deg); }
.cat-header .count { font-size: 11px; background: rgba(255,255,255,0.06); padding: 1px 7px; border-radius: 20px; flex-shrink: 0; }
.cat-header.active .count { background: var(--orange); color: #fff; }
.cat-body { overflow: hidden; max-height: 0; transition: max-height 0.3s ease; }
.cat-body.open { max-height: 2000px; }
.cat-sub-filter { width: 100%; text-align: right; padding: 7px 12px 7px 28px; border-radius: var(--radius-sm); border: none; background: transparent; color: var(--text-muted); font-family: 'Tajawal', sans-serif; font-size: 12px; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; justify-content: space-between; margin-top: 2px; }
.cat-sub-filter:hover { background: rgba(249,115,22,0.08); color: var(--text); }
.all-filter { width: 100%; text-align: right; padding: 10px 12px; border-radius: var(--radius-sm); border: 1px solid var(--border); background: transparent; color: var(--text-muted); font-family: 'Tajawal', sans-serif; font-size: 13px; cursor: pointer; transition: all 0.2s; margin-bottom: 6px; display: flex; align-items: center; justify-content: space-between; }
.all-filter:hover, .all-filter.active { background: var(--orange-dim); border-color: var(--border-hover); color: var(--text); }
.all-filter .count { font-size: 11px; background: rgba(255,255,255,0.06); padding: 1px 7px; border-radius: 20px; }
.all-filter.active .count { background: var(--orange); color: #fff; }
.add-cat-btn { width: 100%; margin-top: 8px; padding: 8px 12px; border-radius: var(--radius-sm); border: 1px dashed rgba(249,115,22,0.3); background: transparent; color: rgba(249,115,22,0.6); font-family: 'Tajawal', sans-serif; font-size: 12px; font-weight: 700; cursor: pointer; transition: all 0.2s; }
.add-cat-btn:hover { border-color: var(--orange); color: var(--orange); background: var(--orange-glow); }

/* DELETE CAT btn */
.cat-del-btn { width: 18px; height: 18px; border-radius: 4px; border: none; background: transparent; color: rgba(239,68,68,0.4); font-size: 12px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all 0.15s; padding: 0; line-height: 1; }
.cat-del-btn:hover { color: #EF4444; background: rgba(239,68,68,0.1); }

/* MAIN TOOLBAR */
.main-toolbar { display: flex; justify-content: flex-end; margin-bottom: 14px; }
.add-idea-btn { padding: 9px 18px; border-radius: var(--radius-sm); border: 1px solid rgba(249,115,22,0.4); background: var(--orange-dim); color: var(--orange); font-family: 'Tajawal', sans-serif; font-size: 13px; font-weight: 700; cursor: pointer; transition: all 0.2s; }
.add-idea-btn:hover { background: var(--orange); color: #fff; }

/* ADD MODALS */
.mini-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.75); backdrop-filter: blur(8px); z-index: 400; display: none; align-items: center; justify-content: center; padding: 20px; }
.mini-overlay.open { display: flex; }
.mini-modal { background: var(--surface); border: 1px solid rgba(255,255,255,0.1); border-radius: var(--radius); width: 100%; max-width: 440px; padding: 24px; display: flex; flex-direction: column; gap: 14px; }
.mini-modal h3 { font-size: 15px; font-weight: 800; color: var(--text); }
.mini-modal label { font-size: 11px; font-weight: 700; color: var(--text-muted); display: block; margin-bottom: 6px; }
.mini-input { width: 100%; background: rgba(0,0,0,0.3); border: 1px solid var(--border); border-radius: var(--radius-sm); color: var(--text); font-family: 'Tajawal', sans-serif; font-size: 14px; padding: 10px 12px; outline: none; transition: border-color 0.2s; direction: rtl; }
.mini-input:focus { border-color: rgba(249,115,22,0.4); }
.mini-textarea { min-height: 80px; resize: vertical; }
.mini-select { appearance: none; -webkit-appearance: none; cursor: pointer; }
.mini-foot { display: flex; gap: 8px; justify-content: flex-end; margin-top: 4px; }
</style>
</head>
<body>

<nav>
  <div class="nav-logo">
    <div class="nav-logo-icon">ج</div>
    <div class="nav-title">زاوية جاليو <span>| مخطط المحتوى</span></div>
  </div>
  <div class="nav-stats">
    <span>جاري التصوير: <b class="stat-rec" id="s-rec">0</b></span>
    <span>مكتمل: <b class="stat-done" id="s-done">0</b></span>
    <span>الكل: <b id="s-total">0</b></span>
    <span id="sync-status" style="opacity:0;transition:opacity 0.3s;font-size:11px;"></span>
  </div>
  <button class="hamburger-btn" onclick="toggleDrawer()" id="hamburger-btn">☰</button>
</nav>

<!-- DRAWER OVERLAY -->
<div class="drawer-overlay" id="drawer-overlay" onclick="closeDrawer()"></div>

<div class="layout">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-block">
      <h3>التصنيفات</h3>
      <div id="cat-list"></div>
      <button class="add-cat-btn" onclick="openAddCat()">＋ تصنيف جديد</button>
    </div>
    <div class="tip">💡 اضغط على أي كارد عشان تكتب السكريبت. كل حاجة بتتحفظ تلقائياً.</div>
  </aside>

  <main class="main">
    <div class="main-toolbar">
      <button class="add-idea-btn" onclick="openAddIdea()">＋ فكرة جديدة</button>
    </div>
    <div class="grid" id="grid"></div>
  </main>
</div>

<!-- MODAL -->
<div class="overlay" id="modal-overlay" onclick="closeModal(event)">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-head">
      <div class="modal-head-info">
        <div class="modal-cat-tag" id="m-cat"></div>
        <div class="modal-title" id="m-title"></div>
      </div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <div>
        <div class="textarea-label">
          <span>الحالة</span>
        </div>
        <div class="modal-status-row">
          <button class="status-btn pending" id="sb-pending" onclick="setStatus('pending')">⚪ لم يبدأ</button>
          <button class="status-btn recording" id="sb-recording" onclick="setStatus('recording')">🎥 جاري التصوير</button>
          <button class="status-btn done" id="sb-done" onclick="setStatus('done')">✅ مكتمل</button>
        </div>
      </div>
      <div>
        <div class="textarea-label">
          <span>السكريبت</span>
          <span class="autosave-badge" id="autosave-badge">✓ تم الحفظ</span>
        </div>
        <textarea class="script-area" id="script-area" placeholder="Hook: ابدأ بجملة واحدة تخلي الواحد يوقف السكرول..." oninput="autoSave()"></textarea>
      </div>
    </div>
    <div class="modal-foot">
      <button class="btn btn-tele" onclick="openTele()">📺 Teleprompter</button>
      <button class="btn btn-ghost" onclick="closeModal()">إغلاق</button>
      <button class="btn btn-primary" onclick="saveAndClose()">حفظ</button>
    </div>
  </div>
</div>

<!-- TELEPROMPTER -->
<div class="tele-overlay" id="tele">
  <div class="tele-controls">
    <button class="tele-btn play" id="tele-play-btn" onclick="toggleTele()">▶ تشغيل</button>
    <button class="tele-btn restart" onclick="restartTele()">↩ من البداية</button>
    <button class="tele-btn stop" onclick="closeTele()">✕ إغلاق</button>
    <div class="tele-speed-wrap">
      <span>السرعة:</span>
      <button class="speed-btn" onclick="changeSpeed(-0.2)">−</button>
      <span class="speed-label" id="speed-label">1.0x</span>
      <button class="speed-btn" onclick="changeSpeed(0.2)">+</button>
    </div>
  </div>

  {id:108,cat:"شخصيات",text:'"Herb Lubalin" — الراجل اللي خلى الـ "typography" تعبّر — الكلمة بقت صورة في إيده'},
  {id:109,cat:"شخصيات",text:'"Stefan Sagmeister" — الراجل اللي بياخد سنة إجازة كل 7 سنين عشان يرجع مبدع — ولسه شاغل'},
  {id:110,cat:"شخصيات",text:'"Neville Brody" — صمم الـ "Face Magazine" في الـ 80s وغيّر وجه الـ "editorial design" للأبد'}
];

// ─── FIREBASE ───────────────────────────────────────────────
const FIREBASE_URL = 'https://galio-7c334-default-rtdb.europe-west1.firebasedatabase.app';
const STORE_PATH   = '/galio_store.json';
let _saveTimeout   = null;
let store = { data:{}, customCats:[], customIdeas:[], openCats:{} };

async function loadStore() {
  try {
    showSync('loading');
    const res = await fetch(FIREBASE_URL + STORE_PATH);
    const remote = await res.json();
    if (remote && typeof remote === 'object') store = remote;
  } catch(e) { console.warn('load failed', e); }
  if (!store.data)        store.data = {};
  if (!store.customCats)  store.customCats = [];
  if (!store.customIdeas) store.customIdeas = [];
  if (!store.openCats)    store.openCats = {};
  hideSync();
}

function saveStore() {
  clearTimeout(_saveTimeout);
  _saveTimeout = setTimeout(async () => {
    try {
      showSync('saving');
      await fetch(FIREBASE_URL + STORE_PATH, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(store)
      });
      hideSync();
    } catch(e) { hideSync('error'); }
  }, 600);
}

function showSync(state) {
  const el = document.getElementById('sync-status');
  if (!el) return;
  el.style.opacity = '1';
  if (state === 'loading') { el.textContent = '⏳ جاري التحميل...'; el.style.color = '#94A3B8'; }
  if (state === 'saving')  { el.textContent = '☁ حفظ...'; el.style.color = '#F59E0B'; }
}
function hideSync(state) {
  const el = document.getElementById('sync-status');
  if (!el) return;
  if (state === 'error') { el.textContent = '⚠ فشل الحفظ'; el.style.color = '#EF4444'; return; }
  el.textContent = '✓ محفوظ'; el.style.color = '#10B981';
  setTimeout(() => { el.style.opacity = '0'; }, 2000);
}

await loadStore();

// seed built-in ideas
IDEAS_RAW.forEach(idea => {
  if (!store.data[idea.id]) store.data[idea.id] = { status:'pending', script:'' };
});

// ─── DERIVED DATA ────────────────────────────────────────────
const BUILTIN_CATS = ['AI والتطور','Tools','التصميم','الفن والتاريخ','وجهات نظر','شخصيات'];

function getAllCats() {
  return [...BUILTIN_CATS, ...store.customCats];
}

function getAllIdeas() {
  return [...IDEAS_RAW, ...store.customIdeas];
}

function getIdeaById(id) {
  return getAllIdeas().find(i => i.id === id);
}

// ─── STATE ──────────────────────────────────────────────────
let currentFilter = 'all';
let currentId = null;
let deleteId = null;
let teleRunning = false;
let teleSpeed = 1.0;
let teleRaf = null;
let telePos = 0;
let autosaveTimer = null;

// ─── PROGRESS ───────────────────────────────────────────────
function getProgress(id) {
  const s = store.data[id]?.script || '';
  if (!s.trim()) return 0;
  if (s.length < 50) return 30;
  if (s.length < 200) return 60;
  return 100;
}

// ─── SIDEBAR RENDER ─────────────────────────────────────────
function renderSidebar() {
  const allIdeas = getAllIdeas();
  const allCats  = getAllCats();
  const totalCount = allIdeas.length;

  let html = `<button class="all-filter ${currentFilter==='all'?'active':''}" onclick="setFilter('all')">
    <span>كل الأفكار</span><span class="count">${totalCount}</span>
  </button>`;

  allCats.forEach(cat => {
    const count = allIdeas.filter(i => i.cat === cat).length;
    const isOpen = !!store.openCats[cat];
    const isActive = currentFilter === cat;
    const isCustom = !BUILTIN_CATS.includes(cat);

    html += `<div class="cat-group">
      <button class="cat-header ${isActive?'active':''} ${isOpen?'open':''}" onclick="toggleCat('${escAttr(cat)}')">
        <span class="cat-left">
          <span class="cat-arrow">▼</span>
          <span>${cat}</span>
        </span>
        <span style="display:flex;align-items:center;gap:6px">
          <span class="count">${count}</span>
          ${isCustom ? `<button class="cat-del-btn" onclick="event.stopPropagation();askDeleteCat('${escAttr(cat)}')" title="حذف التصنيف">✕</button>` : ''}
        </span>
      </button>
      <div class="cat-body ${isOpen?'open':''}">
        <button class="cat-sub-filter" onclick="setFilter('${escAttr(cat)}')">عرض الكل (${count})</button>
      </div>
    </div>`;
  });

  document.getElementById('cat-list').innerHTML = html;
}

function escAttr(s) { return s.replace(/'/g,"&#39;").replace(/"/g,'&quot;'); }

function toggleCat(cat) {
  store.openCats[cat] = !store.openCats[cat];
  saveStore();
  if (currentFilter === cat || currentFilter === 'all') {
    // just re-render sidebar
  }
  renderSidebar();
}

// ─── GRID RENDER ────────────────────────────────────────────
function getFiltered() {
  if (currentFilter === 'all') return getAllIdeas();
  return getAllIdeas().filter(i => i.cat === currentFilter);
}

function renderGrid() {
  const grid = document.getElementById('grid');
  const items = getFiltered();
  if (!items.length) {
    grid.innerHTML = '<div class="empty"><div class="empty-icon">🔍</div><p>مفيش أفكار في التصنيف ده</p></div>';
    return;
  }
  grid.innerHTML = items.map(idea => {
    const d = store.data[idea.id] || {status:'pending',script:''};
    const prog = getProgress(idea.id);
    const statusClass = d.status === 'done' ? 'done' : d.status === 'recording' ? 'recording' : '';
    const progLabel = prog === 0 ? 'فاضي' : prog < 100 ? 'جاري الكتابة' : 'مكتمل';
    return `<div class="card ${statusClass}" onclick="openModal('${idea.id}')">
      <div class="card-status-bar"></div>
      <div class="card-head">
        <div class="card-meta">
          <span class="card-cat">${idea.cat}</span>
          <span class="card-num">#${String(idea.id).padStart(3,'0')}</span>
        </div>
        <div class="card-title">${idea.text}</div>
      </div>
      <div class="card-foot">
        <div class="card-progress">
          <div class="progress-bar"><div class="progress-fill" style="width:${prog}%"></div></div>
          <span class="progress-label">${progLabel}</span>
        </div>
        <div class="card-actions" onclick="event.stopPropagation()">
          <button class="btn-icon" onclick="openModal('${idea.id}')" title="تعديل">✏️</button>
          <button class="btn-icon danger" onclick="askDelete('${idea.id}')" title="حذف السكريبت">🗑️</button>
        </div>
      </div>
    </div>`;
  }).join('');
}

// ─── STATS ──────────────────────────────────────────────────
function updateStats() {
  const all = getAllIdeas();
  const rec  = all.filter(i => store.data[i.id]?.status === 'recording').length;
  const done = all.filter(i => store.data[i.id]?.status === 'done').length;
  document.getElementById('s-rec').textContent = rec;
  document.getElementById('s-done').textContent = done;
  document.getElementById('s-total').textContent = all.length;
}

// ─── DRAWER (mobile) ────────────────────────────────────────
function toggleDrawer() {
  const sidebar = document.getElementById('sidebar');
  const overlay = document.getElementById('drawer-overlay');
  const isOpen = sidebar.classList.contains('drawer-open');
  if (isOpen) { closeDrawer(); } else { sidebar.classList.add('drawer-open'); overlay.classList.add('open'); document.body.style.overflow = 'hidden'; }
}
function closeDrawer() {
  document.getElementById('sidebar').classList.remove('drawer-open');
  document.getElementById('drawer-overlay').classList.remove('open');
  document.body.style.overflow = '';
}

// ─── FILTER ─────────────────────────────────────────────────
function setFilter(cat) {
  currentFilter = cat;
  closeDrawer();
  renderSidebar();
  renderGrid();
}

// ─── MODAL ──────────────────────────────────────────────────
function openModal(id) {
  currentId = id;
  const idea = getIdeaById(id);
  if (!store.data[id]) store.data[id] = { status:'pending', script:'' };
  const d = store.data[id];
  document.getElementById('m-cat').textContent = idea.cat;
  document.getElementById('m-title').textContent = idea.text;
  document.getElementById('script-area').value = d.script || '';
  updateStatusBtns(d.status);
  document.getElementById('autosave-badge').classList.remove('show');
  document.getElementById('modal-overlay').classList.add('open');
}

function closeModal(e) {
  if (e && e.target !== document.getElementById('modal-overlay')) return;
  document.getElementById('modal-overlay').classList.remove('open');
  saveStore();
  renderGrid();
  updateStats();
}

function updateStatusBtns(status) {
  ['pending','recording','done'].forEach(s => {
    document.getElementById('sb-'+s).classList.toggle('active', s === status);
  });
}

function setStatus(s) {
  if (!currentId) return;
  store.data[currentId].status = s;
  updateStatusBtns(s);
  saveStore();
}

function autoSave() {
  if (!currentId) return;
  if (!store.data[currentId]) store.data[currentId] = {status:'pending',script:''};
  store.data[currentId].script = document.getElementById('script-area').value;
  clearTimeout(autosaveTimer);
  autosaveTimer = setTimeout(() => {
    saveStore();
    const badge = document.getElementById('autosave-badge');
    badge.classList.add('show');
    setTimeout(() => badge.classList.remove('show'), 2000);
  }, 600);
}

function saveAndClose() {
  if (currentId) {
    if (!store.data[currentId]) store.data[currentId] = {status:'pending',script:''};
    store.data[currentId].script = document.getElementById('script-area').value;
    saveStore();
  }
  document.getElementById('modal-overlay').classList.remove('open');
  renderGrid(); updateStats();
}

// ─── DELETE IDEA ────────────────────────────────────────────
function askDelete(id) {
  deleteId = id;
  document.getElementById('confirm-overlay').classList.add('open');
}
function closeConfirm() {
  document.getElementById('confirm-overlay').classList.remove('open');
  deleteId = null;
}
function confirmDelete() {
  if (deleteId) {
    // if custom idea — remove entirely
    const idx = store.customIdeas.findIndex(i => i.id === deleteId);
    if (idx !== -1) {
      store.customIdeas.splice(idx, 1);
    } else {
      store.data[deleteId] = { status:'pending', script:'' };
    }
    saveStore();
  }
  closeConfirm();
  renderGrid(); renderSidebar(); updateStats();
}

// ─── ADD CATEGORY ───────────────────────────────────────────
function openAddCat() {
  document.getElementById('new-cat-input').value = '';
  document.getElementById('add-cat-overlay').classList.add('open');
  setTimeout(() => document.getElementById('new-cat-input').focus(), 100);
}
function closeAddCat(e) {
  if (e && e.target !== document.getElementById('add-cat-overlay')) return;
  document.getElementById('add-cat-overlay').classList.remove('open');
}
function confirmAddCat() {
  const name = document.getElementById('new-cat-input').value.trim();
  if (!name) return;
  if (getAllCats().includes(name)) { alert('التصنيف ده موجود خالص'); return; }
  store.customCats.push(name);
  saveStore();
  document.getElementById('add-cat-overlay').classList.remove('open');
  renderSidebar(); updateStats();
}

// ─── DELETE CATEGORY ────────────────────────────────────────
let deleteCatName = null;
function askDeleteCat(cat) {
  deleteCatName = cat;
  if (confirm(`هتحذف تصنيف "${cat}" وكل أفكاره؟`)) {
    confirmDeleteCat();
  }
}
function confirmDeleteCat() {
  if (!deleteCatName) return;
  // remove from customCats
  store.customCats = store.customCats.filter(c => c !== deleteCatName);
  // remove its custom ideas + data
  const toRemove = store.customIdeas.filter(i => i.cat === deleteCatName).map(i => i.id);
  toRemove.forEach(id => delete store.data[id]);
  store.customIdeas = store.customIdeas.filter(i => i.cat !== deleteCatName);
  saveStore();
  if (currentFilter === deleteCatName) currentFilter = 'all';
  deleteCatName = null;
  renderSidebar(); renderGrid(); updateStats();
}

// ─── ADD IDEA ───────────────────────────────────────────────
function openAddIdea() {
  const sel = document.getElementById('new-idea-cat');
  sel.innerHTML = getAllCats().map(c => `<option value="${c}">${c}</option>`).join('');
  if (currentFilter !== 'all') sel.value = currentFilter;
  document.getElementById('new-idea-text').value = '';
  document.getElementById('add-idea-overlay').classList.add('open');
  setTimeout(() => document.getElementById('new-idea-text').focus(), 100);
}
function closeAddIdea(e) {
  if (e && e.target !== document.getElementById('add-idea-overlay')) return;
  document.getElementById('add-idea-overlay').classList.remove('open');
}
function confirmAddIdea() {
  const cat  = document.getElementById('new-idea-cat').value;
  const text = document.getElementById('new-idea-text').value.trim();
  if (!text) return;
  const newId = 'c_' + Date.now();
  store.customIdeas.push({ id: newId, cat, text });
  store.data[newId] = { status:'pending', script:'' };
  saveStore();
  document.getElementById('add-idea-overlay').classList.remove('open');
  renderSidebar(); renderGrid(); updateStats();
}

// ─── TELEPROMPTER ───────────────────────────────────────────
function openTele() {
  const script = document.getElementById('script-area').value;
  if (!script.trim()) { alert('اكتب السكريبت الأول'); return; }
  const lines = script.split('\n').filter(l => l.trim());
  const html = lines.map(l => {
    const formatted = l.replace(/^(Hook:)/i, '<span class="tele-hook">$1</span>');
    return `<p style="margin-bottom:1.2em">${formatted}</p>`;
  }).join('');
  document.getElementById('tele-text').innerHTML = html;
  telePos = 0;
  const scrollEl = document.getElementById('tele-scroll');
  scrollEl.scrollTop = 0;
  document.getElementById('tele').classList.add('open');
  teleRunning = false;
  document.getElementById('tele-play-btn').textContent = '▶ تشغيل';
  initTeleDrag();
}

function closeTele() { stopTele(); document.getElementById('tele').classList.remove('open'); }
function restartTele() { stopTele(); document.getElementById('tele-scroll').scrollTop = 0; document.getElementById('tele-play-btn').textContent = '▶ تشغيل'; }

function toggleTele() {
  if (teleRunning) { stopTele(); document.getElementById('tele-play-btn').textContent = '▶ تشغيل'; }
  else { startTele(); document.getElementById('tele-play-btn').textContent = '⏸ إيقاف'; }
}

function startTele() {
  teleRunning = true;
  const scroll = document.getElementById('tele-scroll');
  let last = null;
  function step(ts) {
    if (!teleRunning) return;
    if (last) { const dt = ts - last; scroll.scrollTop += (teleSpeed * 0.06 * dt); }
    last = ts;
    teleRaf = requestAnimationFrame(step);
  }
  teleRaf = requestAnimationFrame(step);
}

function stopTele() { teleRunning = false; cancelAnimationFrame(teleRaf); }
function changeSpeed(d) {
  teleSpeed = Math.max(0.2, Math.min(4, Math.round((teleSpeed + d) * 10) / 10));
  document.getElementById('speed-label').textContent = teleSpeed.toFixed(1) + 'x';
}

function initTeleDrag() {
  const el = document.getElementById('tele-scroll');
  let isDragging = false, startY = 0, startTop = 0;
  el.onmousedown = function(e) { isDragging = true; startY = e.clientY; startTop = el.scrollTop; e.preventDefault(); };
  document.onmousemove = function(e) { if (!isDragging) return; el.scrollTop = startTop - (e.clientY - startY); };
  document.onmouseup = function() { isDragging = false; };
  el.ontouchstart = function(e) { startY = e.touches[0].clientY; startTop = el.scrollTop; };
  el.ontouchmove = function(e) { el.scrollTop = startTop - (e.touches[0].clientY - startY); e.preventDefault(); };
}


// ─── EDIT IDEA ───────────────────────────────────────────────
let editIdeaId = null;
function openEditIdea(id) {
  const idea = store.customIdeas.find(i => String(i.id) === String(id));
  if (!idea) return;
  editIdeaId = id;
  const sel = document.getElementById('edit-idea-cat');
  sel.innerHTML = getAllCats().map(c => `<option value="${c}" ${c===idea.cat?'selected':''}>${c}</option>`).join('');
  document.getElementById('edit-idea-text').value = idea.text;
  document.getElementById('edit-idea-overlay').classList.add('open');
}
function closeEditIdea(e) {
  if (e && e.target !== document.getElementById('edit-idea-overlay')) return;
  document.getElementById('edit-idea-overlay').classList.remove('open');
  editIdeaId = null;
}
function confirmEditIdea() {
  const idea = store.customIdeas.find(i => String(i.id) === String(editIdeaId));
  if (!idea) return;
  const newCat  = document.getElementById('edit-idea-cat').value;
  const newText = document.getElementById('edit-idea-text').value.trim();
  if (!newText) return;
  idea.cat  = newCat;
  idea.text = newText;
  saveStore();
  document.getElementById('edit-idea-overlay').classList.remove('open');
  editIdeaId = null;
  renderSidebar(); renderGrid(); updateStats();
}

// ─── KEYBOARD ───────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') { closeTele(); closeDrawer(); document.getElementById('modal-overlay').classList.remove('open'); closeConfirm(); document.getElementById('add-cat-overlay').classList.remove('open'); document.getElementById('add-idea-overlay').classList.remove('open'); }
  if (e.key === 'Enter' && document.getElementById('add-cat-overlay').classList.contains('open')) confirmAddCat();
});


// ─── GLOBALS FOR INLINE HANDLERS ────────────────────────────
Object.assign(window, {
  setFilter, toggleCat, openModal, closeModal, saveAndClose,
  setStatus, autoSave, openTele, closeTele, restartTele,
  toggleTele, changeSpeed, askDelete, closeConfirm, confirmDelete,
  openAddCat, closeAddCat, confirmAddCat, askDeleteCat,
  openAddIdea, closeAddIdea, confirmAddIdea,
  openEditIdea, closeEditIdea, confirmEditIdea,
  toggleDrawer, closeDrawer
});

// ─── INIT ───────────────────────────────────────────────────
renderSidebar();
renderGrid();
updateStats();
</script>

<!-- EDIT IDEA MODAL -->
<div class="mini-overlay" id="edit-idea-overlay" onclick="closeEditIdea(event)">
  <div class="mini-modal" onclick="event.stopPropagation()">
    <h3>📝 تعديل الفكرة</h3>
    <div>
      <label>التصنيف</label>
      <select class="mini-input mini-select" id="edit-idea-cat"></select>
    </div>
    <div>
      <label>نص الفكرة</label>
      <textarea class="mini-input mini-textarea" id="edit-idea-text" placeholder="اكتب الفكرة هنا..."></textarea>
    </div>
    <div class="mini-foot">
      <button class="btn btn-ghost" onclick="closeEditIdea()">إلغاء</button>
      <button class="btn btn-primary" onclick="confirmEditIdea()">حفظ</button>
    </div>
  </div>
</div>

</body>
</html>
